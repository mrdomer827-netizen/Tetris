<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mortal Kombat Lite · Битва</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a12, #020208);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Press Start 2P', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #1a1a24dd;
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7);
            border: 2px solid #aa1a2a;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #8b0000, 0 15px 30px black;
            background: #2a1a1a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 20px;
            background: #0f0f1acc;
            padding: 10px 25px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }

        .health-bars {
            display: flex;
            gap: 40px;
            background: #000000aa;
            padding: 8px 24px;
            border-radius: 40px;
        }

        .health {
            color: #ffcc88;
            font-weight: bold;
            font-size: 18px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #b52e2e, #8b0000);
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 28px;
            border-radius: 40px;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
            box-shadow: 0 4px 0 #4a0000;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #4a0000;
        }

        .controls {
            display: flex;
            gap: 20px;
            background: #00000099;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 11px;
            color: #ffbb77;
            flex-wrap: wrap;
        }

        .controls span {
            background: #2a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .controls span { font-size: 9px; padding: 3px 8px; }
            .health { font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div class="info-panel">
        <div class="health-bars">
            <div class="health">❄️ САБ-ЗИРО: <span id="p1Hp">100</span>%</div>
            <div class="health">🔥 СКОРПИОН: <span id="p2Hp">100</span>%</div>
        </div>
        <button class="restart-btn" id="restartBtn">⚔️ НОВАЯ СХВАТКА</button>
        <div class="controls">
            <span>⬅️➡️⬆️⬇️ — Движение P1</span>
            <span>🟢 [X] — Удар</span>
            <span>🔵 [C] — Блок</span>
            <span>💥 [V] — Спецатака (Ледяной шар)</span>
            <span>🔄 R — Рестарт</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 800, H = 450;
        const GROUND_Y = H - 65;
        
        // Игрок 1 (Саб-Зиро, слева)
        let p1 = {
            x: 140,
            y: GROUND_Y,
            width: 44,
            height: 64,
            hp: 100,
            maxHp: 100,
            facingRight: true,
            attacking: false,
            attackTimer: 0,
            block: false,
            blockTimer: 0,
            hitTimer: 0,
            specialCooldown: 0,
            specialReady: true
        };
        
        // Игрок 2 (Скорпион, справа)
        let p2 = {
            x: W - 180,
            y: GROUND_Y,
            width: 44,
            height: 64,
            hp: 100,
            maxHp: 100,
            facingRight: false,
            attacking: false,
            attackTimer: 0,
            block: false,
            blockTimer: 0,
            hitTimer: 0,
            specialCooldown: 0,
            specialReady: true
        };
        
        // Спецатаки (снаряды)
        let projectiles = [];
        
        let gameActive = true;
        let winner = null;
        let frame = 0;
        
        // Управление P1 (клавиши для Саб-Зиро)
        const keys = {
            ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false,
            KeyX: false, KeyC: false, KeyV: false
        };
        
        // AI для противника (простой)
        let aiTimer = 0;
        
        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function updateUI() {
            document.getElementById('p1Hp').innerText = Math.max(0, p1.hp);
            document.getElementById('p2Hp').innerText = Math.max(0, p2.hp);
        }
        
        // Ограничение позиций, чтобы бойцы не выходили за край и не сталкивались
        function clampPositions() {
            // P1 границы
            if(p1.x < 50) p1.x = 50;
            if(p1.x + p1.width > W - 150) p1.x = W - 150 - p1.width;
            // P2 границы
            if(p2.x < 100) p2.x = 100;
            if(p2.x + p2.width > W - 50) p2.x = W - 50 - p2.width;
            
            // Бойцы не могут проходить друг сквозь друга
            if(p1.x + p1.width > p2.x && p1.x < p2.x + p2.width && Math.abs(p1.y - p2.y) < 50) {
                if(p1.x < p2.x) {
                    p1.x = p2.x - p1.width;
                } else {
                    p2.x = p1.x + p1.width;
                }
            }
            
            // Направление взгляда (кто куда смотрит)
            if(p1.x < p2.x) p1.facingRight = true;
            else p1.facingRight = false;
            
            if(p2.x > p1.x) p2.facingRight = true;
            else p2.facingRight = false;
        }
        
        // Удар (дистанция и урон)
        function tryAttack(attacker, defender, damage, isSpecial = false) {
            if(!gameActive) return false;
            if(attacker.attackTimer > 0) return false;
            if(isSpecial && attacker.specialCooldown > 0) return false;
            
            let distance = Math.abs(attacker.x - defender.x);
            let attackRange = isSpecial ? 90 : 55;
            if(distance < attackRange) {
                // Если защита
                if(defender.block && defender.blockTimer > 0) {
                    let blockDamage = Math.floor(damage * 0.3);
                    defender.hp -= blockDamage;
                    if(defender.hp < 0) defender.hp = 0;
                    updateUI();
                    // эффект блока
                    return true;
                } else {
                    defender.hp -= damage;
                    if(defender.hp < 0) defender.hp = 0;
                    defender.hitTimer = 12;
                    updateUI();
                    return true;
                }
            }
            return false;
        }
        
        // Спецатака: Саб-Зиро бросает ледяной шар
        function throwIceBall() {
            if(!gameActive) return;
            if(p1.specialCooldown > 0) return;
            let direction = p1.facingRight ? 1 : -1;
            projectiles.push({
                x: p1.x + (direction > 0 ? p1.width : -10),
                y: p1.y + 30,
                vx: direction * 7,
                radius: 12,
                damage: 14,
                owner: 'p1',
                life: true
            });
            p1.specialCooldown = 60;
            p1.attackTimer = 15;
        }
        
        // AI для P2
        function updateAI() {
            if(!gameActive) return;
            if(p2.hp <= 0) return;
            
            // Простой AI: приближается, атакует
            let distance = Math.abs(p1.x - p2.x);
            if(distance > 70) {
                if(p2.x < p1.x) p2.x += 2.5;
                else if(p2.x > p1.x) p2.x -= 2.5;
            }
            
            // Атака
            if(p2.attackTimer === 0 && p2.hitTimer === 0 && distance < 65 && Math.random() < 0.035) {
                let damage = 8;
                if(tryAttack(p2, p1, damage, false)) {
                    p2.attackTimer = 25;
                }
            }
            
            // Блок AI если игрок атакует
            if(p1.attackTimer > 0 && distance < 70 && p2.blockTimer === 0 && Math.random() < 0.6) {
                p2.block = true;
                p2.blockTimer = 20;
            } else {
                if(p2.blockTimer <= 0) p2.block = false;
            }
            
            // Спецатака AI (редко)
            if(p2.specialCooldown === 0 && distance > 40 && distance < 130 && Math.random() < 0.01) {
                // Скорпион — огненный шар
                let direction = p2.facingRight ? 1 : -1;
                projectiles.push({
                    x: p2.x + (direction > 0 ? p2.width : -10),
                    y: p2.y + 30,
                    vx: direction * 6.5,
                    radius: 12,
                    damage: 13,
                    owner: 'p2',
                    life: true
                });
                p2.specialCooldown = 65;
                p2.attackTimer = 15;
            }
        }
        
        // Обновление таймеров и снарядов
        function updateTimers() {
            if(p1.attackTimer > 0) p1.attackTimer--;
            if(p2.attackTimer > 0) p2.attackTimer--;
            if(p1.hitTimer > 0) p1.hitTimer--;
            if(p2.hitTimer > 0) p2.hitTimer--;
            if(p1.blockTimer > 0) { p1.blockTimer--; p1.block = p1.blockTimer > 0; }
            if(p2.blockTimer > 0) { p2.blockTimer--; p2.block = p2.blockTimer > 0; }
            if(p1.specialCooldown > 0) p1.specialCooldown--;
            if(p2.specialCooldown > 0) p2.specialCooldown--;
            
            // Снаряды
            for(let i=0; i<projectiles.length; i++) {
                let pr = projectiles[i];
                pr.x += pr.vx;
                if(pr.x < -50 || pr.x > W+50) {
                    projectiles.splice(i,1);
                    i--;
                    continue;
                }
                // Попадание в игрока
                let target = (pr.owner === 'p1') ? p2 : p1;
                let targetRect = { x: target.x, y: target.y, w: target.width, h: target.height };
                if(pr.x + pr.radius > targetRect.x && pr.x - pr.radius < targetRect.x + targetRect.w &&
                   pr.y + pr.radius > targetRect.y && pr.y - pr.radius < targetRect.y + targetRect.h) {
                    if(target.block && target.blockTimer > 0) {
                        target.hp -= Math.floor(pr.damage * 0.3);
                    } else {
                        target.hp -= pr.damage;
                        target.hitTimer = 12;
                    }
                    if(target.hp < 0) target.hp = 0;
                    updateUI();
                    projectiles.splice(i,1);
                    i--;
                }
            }
        }
        
        // Проверка победы
        function checkVictory() {
            if(p1.hp <= 0) {
                gameActive = false;
                winner = 'SCORPION';
            } else if(p2.hp <= 0) {
                gameActive = false;
                winner = 'SUB-ZERO';
            }
        }
        
        // Обработка ввода игрока
        function handleInput() {
            if(!gameActive) return;
            
            // Движение (стрелки)
            if(keys.ArrowLeft && p1.x > 50) p1.x -= 5;
            if(keys.ArrowRight && p1.x + p1.width < W - 150) p1.x += 5;
            if(keys.ArrowUp && p1.y > GROUND_Y - 20) p1.y -= 4.5;
            if(keys.ArrowDown && p1.y < GROUND_Y) p1.y += 4.5;
            // возврат на землю по Y
            if(p1.y < GROUND_Y) p1.y += 2;
            if(p1.y > GROUND_Y) p1.y = GROUND_Y;
            
            // Атака X
            if(keys.KeyX && p1.attackTimer === 0 && p1.hitTimer === 0) {
                let damage = 9;
                tryAttack(p1, p2, damage, false);
                p1.attackTimer = 20;
            }
            
            // Блок C
            if(keys.KeyC && p1.blockTimer === 0) {
                p1.block = true;
                p1.blockTimer = 28;
            }
            
            // Спецатака V
            if(keys.KeyV && p1.specialCooldown === 0 && p1.attackTimer === 0) {
                throwIceBall();
            }
        }
        
        // --- ОТРИСОВКА ---
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a0f12');
            grad.addColorStop(1, '#2d1a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            // луна
            ctx.fillStyle = '#ddbb77';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(680, 70, 45, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#aa8866';
            ctx.beginPath();
            ctx.arc(660, 60, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // земля
            ctx.fillStyle = '#2a1a1a';
            ctx.fillRect(0, GROUND_Y+25, W, 60);
            ctx.fillStyle = '#3a2a2a';
            for(let i=0;i<20;i++) {
                ctx.fillRect(i*70, GROUND_Y+30, 35, 8);
            }
        }
        
        function drawHealthBar(x, y, width, height, percent, color) {
            ctx.fillStyle = '#3a1a1a';
            ctx.fillRect(x, y, width, height);
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width * (percent/100), height);
            ctx.strokeStyle = '#aa8866';
            ctx.strokeRect(x, y, width, height);
        }
        
        function drawFighter(fighter, isLeftSide, name) {
            const x = fighter.x;
            const y = fighter.y - fighter.height + 5;
            ctx.save();
            if(fighter.hitTimer > 0) ctx.fillStyle = '#ffaa77';
            else if(fighter.blockTimer > 0) ctx.fillStyle = '#6a8aff';
            else ctx.fillStyle = (name === 'SubZero') ? '#4da6ff' : '#e67a22';
            
            ctx.shadowBlur = 5;
            ctx.fillRect(x, y, fighter.width, fighter.height);
            // лицо
            ctx.fillStyle = '#f7cf9f';
            ctx.fillRect(x+8, y-14, 28, 18);
            ctx.fillStyle = '#222';
            ctx.fillRect(x+14, y-10, 6, 5);
            ctx.fillRect(x+24, y-10, 6, 5);
            // бандана / маска
            if(name === 'SubZero') {
                ctx.fillStyle = '#3399ff';
                ctx.fillRect(x+4, y-18, 36, 8);
            } else {
                ctx.fillStyle = '#cc5500';
                ctx.fillRect(x+4, y-18, 36, 8);
            }
            // костюм детали
            ctx.fillStyle = '#2a2a3a';
            ctx.fillRect(x+10, y+20, 6, 20);
            ctx.fillRect(x+28, y+20, 6, 20);
            
            if(fighter.attackTimer > 0) {
                ctx.beginPath();
                ctx.moveTo(fighter.facingRight ? x+fighter.width : x-20, y+30);
                ctx.lineTo(fighter.facingRight ? x+fighter.width+22 : x-28, y+20);
                ctx.lineTo(fighter.facingRight ? x+fighter.width+18 : x-24, y+38);
                ctx.fillStyle = '#ffff99';
                ctx.fill();
            }
            ctx.restore();
        }
        
        function drawProjectiles() {
            for(let pr of projectiles) {
                ctx.shadowBlur = 8;
                ctx.fillStyle = (pr.owner === 'p1') ? '#88ccff' : '#ff8844';
                ctx.beginPath();
                ctx.arc(pr.x, pr.y, pr.radius-2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(pr.x, pr.y, pr.radius-5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawStatusEffects() {
            if(p1.specialCooldown > 0) {
                ctx.fillStyle = 'rgba(100,150,255,0.4)';
                ctx.fillRect(p1.x-5, p1.y-35, 50, 10);
                ctx.fillStyle = '#88aaff';
                ctx.fillRect(p1.x-5, p1.y-35, 50 * (1 - p1.specialCooldown/60), 10);
            }
            if(p2.specialCooldown > 0) {
                ctx.fillStyle = 'rgba(255,100,50,0.4)';
                ctx.fillRect(p2.x+5, p2.y-35, 50, 10);
                ctx.fillStyle = '#ffaa66';
                ctx.fillRect(p2.x+5, p2.y-35, 50 * (1 - p2.specialCooldown/65), 10);
            }
        }
        
        function drawGameMessages() {
            if(!gameActive) {
                ctx.font = 'bold 42px "Courier New", monospace';
                ctx.fillStyle = '#ffdd99';
                ctx.shadowBlur = 8;
                ctx.textAlign = 'center';
                ctx.fillText(`${winner} WINS!`, W/2, H/2 - 50);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#ffaa66';
                ctx.fillText('Нажми RESTART для новой битвы', W/2, H/2 + 40);
                ctx.textAlign = 'left';
            }
        }
        
        function drawControlsHint() {
            ctx.font = '12px monospace';
            ctx.fillStyle = '#ffcc88aa';
            ctx.fillText('X - Удар | C - Блок | V - Ледяной шар', 20, 40);
        }
        
        // --- ОБНОВЛЕНИЕ ИГРЫ ---
        function updateGame() {
            if(!gameActive) return;
            handleInput();
            updateAI();
            clampPositions();
            updateTimers();
            checkVictory();
        }
        
        // --- РЕСТАРТ ---
        function restartGame() {
            p1 = {
                x: 140, y: GROUND_Y, width: 44, height: 64, hp: 100, maxHp: 100,
                facingRight: true, attacking: false, attackTimer: 0, block: false,
                blockTimer: 0, hitTimer: 0, specialCooldown: 0
            };
            p2 = {
                x: W - 180, y: GROUND_Y, width: 44, height: 64, hp: 100, maxHp: 100,
                facingRight: false, attacking: false, attackTimer: 0, block: false,
                blockTimer: 0, hitTimer: 0, specialCooldown: 0
            };
            projectiles = [];
            gameActive = true;
            winner = null;
            updateUI();
        }
        
        // --- УПРАВЛЕНИЕ КЛАВИШАМИ ---
        function handleKeyDown(e) {
            const code = e.code;
            if(keys.hasOwnProperty(code)) {
                keys[code] = true;
                e.preventDefault();
            }
            if(code === 'KeyR') restartGame();
        }
        
        function handleKeyUp(e) {
            const code = e.code;
            if(keys.hasOwnProperty(code)) {
                keys[code] = false;
                e.preventDefault();
            }
        }
        
        // --- АНИМАЦИЯ ---
        function animate() {
            updateGame();
            drawBackground();
            drawHealthBar(50, 25, 250, 18, p1.hp, '#4c6eff');
            drawHealthBar(W-300, 25, 250, 18, p2.hp, '#ff6644');
            drawFighter(p1, true, 'SubZero');
            drawFighter(p2, false, 'Scorpion');
            drawProjectiles();
            drawStatusEffects();
            drawGameMessages();
            drawControlsHint();
            requestAnimationFrame(animate);
        }
        
        // ИНИЦИАЛИЗАЦИЯ
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        updateUI();
        animate();
    })();
</script>
</body>
</html>
